name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:                    # reusable by release.yml as a gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Pulls the version pinned in cyrius.cyml [package].cyrius.
        # Same pattern as darshana / chakshu / cyim — agnosticos
        # ecosystem convention.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        # mihi pulls stdlib + agnosys (uname / sysinfo wrappers,
        # bundled in cyrius stdlib). See cyrius.cyml [deps].
        run: cyrius deps

      - name: Build smoke binary
        # mihi is a library — the binary target is the in-tree smoke
        # exerciser, not src/main.cyr (which is include-only re-exports
        # consumed by smoke + tests; not buildable standalone).
        run: |
          mkdir -p build
          cyrius build programs/smoke.cyr build/mihi-smoke

      - name: Run smoke binary
        # Multi-line output ending in "mihi smoke ok"; we grep for the
        # trailing line rather than equality-check because the body
        # contains kernel/cpu/mem facts that differ per runner. Non-zero
        # exit also fails this step (set -e).
        run: |
          ./build/mihi-smoke > /tmp/smoke.out
          tail -1 /tmp/smoke.out | grep -qx 'mihi smoke ok' \
            || { echo "smoke output missing trailing 'mihi smoke ok':"; cat /tmp/smoke.out; exit 1; }

      - name: Lint
        # Same tolerance policy as darshana: every src file clean; the
        # only acceptable warning is the cosmetic "exceeds 120
        # characters" rule on comment-divider lines. `cyrius lint`
        # exits non-zero on any output, so we wrap in `|| true` to
        # coexist with the implicit `set -e`.
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            bad=$(echo "$out" | grep -E '^\s*warn ' | grep -v 'exceeds 120 characters' || true)
            if [ -n "$bad" ]; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: non-cosmetic warnings present"; exit 1; }

      - name: Test
        # Explicit path — bare `cyrius test` auto-discovery has varied
        # between releases (see darshana's note). Using the documented
        # `cyrius test <file>` form avoids the discovery surface.
        run: cyrius test tests/mihi.tcyr

      - name: distlib drift check
        # Regenerate dist/mihi.cyr from current src/ and verify it
        # matches what's checked in. Without this, src/ changes can
        # land without the dist artifact getting refreshed — and
        # downstream consumers `include "lib/mihi.cyr"` (which is
        # this dist file), not src/. Drift here = consumers shipping
        # stale code.
        run: |
          cp dist/mihi.cyr /tmp/dist-checked-in.cyr
          cyrius distlib > /dev/null
          diff -q /tmp/dist-checked-in.cyr dist/mihi.cyr \
            || { echo "FAIL: dist/mihi.cyr is stale. Run 'cyrius distlib' and commit."; exit 1; }

      - name: distlib determinism check
        # Byte-deterministic bundles are the reproducible-build
        # contract for library consumers. Run `cyrius distlib` again
        # and SHA-256-compare against the first regen — any drift
        # (timestamps, ordering, formatting noise) fails the build.
        # Mirrors the ai-hwaccel 2.2.4 + libro determinism gates.
        # Sits next to the drift check because both reason about
        # `cyrius distlib` output; drift = stale, determinism =
        # non-reproducible.
        run: |
          sha_first=$(sha256sum dist/mihi.cyr | cut -d' ' -f1)
          cyrius distlib > /dev/null
          sha_second=$(sha256sum dist/mihi.cyr | cut -d' ' -f1)
          if [ "$sha_first" != "$sha_second" ]; then
            echo "FAIL: cyrius distlib is non-deterministic."
            echo "  first SHA:  $sha_first"
            echo "  second SHA: $sha_second"
            exit 1
          fi
          echo "OK: dist/mihi.cyr deterministic (SHA $sha_first)"

      - name: Bench files build
        # Verifies every benches/*.bcyr still compiles against current
        # src/ — catches a contributor removing a helper that a bench
        # file references. Doesn't run the benches (CI overhead;
        # hot-path numbers come from local `scripts/bench-history.sh`
        # runs that write to docs/benchmarks/history.csv).
        run: |
          mkdir -p build
          for f in benches/*.bcyr; do
            name=$(basename "$f" .bcyr)
            echo "--- Building $name ---"
            cyrius build "$f" "build/bench_${name}" >/dev/null \
              || { echo "FAIL: $f no longer compiles"; exit 1; }
          done
          echo "OK: all bench files compile"

      - name: DCE parity check
        # Release builds may set CYRIUS_DCE=1 to drop unreachable
        # stdlib functions (mihi pulls in agnosys which has ~1000
        # unreachable fns). DCE'd smoke must still produce the same
        # trailing "mihi smoke ok" — proves no live symbol was
        # mis-classified as dead.
        run: |
          CYRIUS_DCE=1 cyrius build programs/smoke.cyr build/mihi-smoke-dce
          echo "mihi-smoke-dce: $(wc -c < build/mihi-smoke-dce) bytes"
          ./build/mihi-smoke-dce > /tmp/smoke-dce.out
          tail -1 /tmp/smoke-dce.out | grep -qx 'mihi smoke ok' \
            || { echo "DCE smoke trailing line mismatch:"; cat /tmp/smoke-dce.out; exit 1; }

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan src/ for forbidden patterns
        # mihi CLAUDE.md "Don't" invariants enforced as scan rules:
        #   - Probes are pure reads — no sys_write/sys_unlink/sys_truncate
        #     etc. from inside src/. /proc and /sys are opened RDONLY only.
        #   - No process spawning — sys_execve / sys_fork / exec_* are
        #     out of scope for a read-only probe surface.
        #   - No FFI / dynlib / pam — mihi is meant to be a tiny,
        #     auditable substrate; pulling FFI surface defeats that.
        #   - No huge stack buffers (≥ 64 KiB). Probes use small fixed
        #     buffers (4 kB meminfo, 8 kB cpuinfo, 390 B uts);
        #     anything larger is a contributor mistake.
        run: |
          FAIL=0

          # Pure-read invariant — probes must not mutate the system.
          write_hits=$(grep -rnE '\bsys_(write|writev|pwrite|unlink|truncate|ftruncate|rename|mkdir|rmdir|symlink|link|chmod|chown)\b' src/ 2>/dev/null || true)
          if [ -n "$write_hits" ]; then
            echo "FAIL: probe code calls a write-class syscall (probes are pure reads)"
            echo "$write_hits"
            FAIL=1
          fi

          # No process spawning from probes.
          exec_hits=$(grep -rnE '\bsys_(execve|execveat|fork|vfork|clone)\b|\bexec_(capture|vec)\b|\brun_capture\b' src/ 2>/dev/null || true)
          if [ -n "$exec_hits" ]; then
            echo "FAIL: probe code spawns / execs (forbidden — probes are read-only)"
            echo "$exec_hits"
            FAIL=1
          fi

          # No FFI / dynlib / pam imports.
          ffi_hits=$(grep -rnE 'include "lib/(cffi|dynlib|fdlopen|pam)\.cyr"' src/ 2>/dev/null || true)
          if [ -n "$ffi_hits" ]; then
            echo "FAIL: src/ imports FFI / dynlib / pam library"
            echo "$ffi_hits"
            FAIL=1
          fi

          # Large stack buffers — same 64 KiB threshold the rest of the
          # AGNOS first-party stack uses (chakshu/owl/cyim/darshana).
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr > /tmp/bigbuf.txt
          if [ -s /tmp/bigbuf.txt ]; then
            cat /tmp/bigbuf.txt
            FAIL=1
          fi

          # Library modules must not declare `fn main()` — the library
          # entry shape is include-only re-export. A main body in a
          # [lib].modules file would either shadow consumer main or
          # DCE-drop silently; either way, contributor mistake.
          #
          # src/test.cyr (test entry per cyrius.cyml [build].test) and
          # src/main.cyr (the include-only re-export hub) are NOT
          # library modules; both are dev-only support files. Scan
          # only the files declared in [lib].modules.
          lib_modules=$(awk -F'[][]' '/^modules *=/ {print $2}' cyrius.cyml | tr -d '",')
          if [ -z "$lib_modules" ]; then
            echo "FAIL: could not parse [lib].modules from cyrius.cyml"
            FAIL=1
          fi
          for f in $lib_modules; do
            hits=$(grep -nE '^\s*fn\s+main\s*\(' "$f" 2>/dev/null || true)
            if [ -n "$hits" ]; then
              echo "FAIL: $f is a library module but declares fn main()"
              echo "$hits"
              FAIL=1
            fi
          done

          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        # Floor tightens as v1.0 approaches. P(-1) hardening artifacts
        # (audit doc, ADR 0002, bench infrastructure) landed in 0.5.0
        # + 0.6.0; CI now enforces their presence.
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION LICENSE \
                   SECURITY.md CODE_OF_CONDUCT.md CONTRIBUTING.md \
                   cyrius.cyml CLAUDE.md \
                   docs/development/roadmap.md docs/development/state.md \
                   docs/adr/0001-shared-uts-buffer.md \
                   docs/adr/0002-gpu-singleton-cache.md \
                   docs/sources.md docs/benchmarks.md \
                   benches/probe_paths.bcyr benches/parsers.bcyr \
                   benches/gpu_paths.bcyr \
                   scripts/bench-history.sh \
                   dist/mihi.cyr; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          # At least one audit doc must exist (dated; we don't pin a
          # specific date so a future audit can rotate the artifact).
          # The audit doc is required from v0.6.0 onward per the
          # security-audit feedback memory.
          if ls docs/audit/*-audit.md >/dev/null 2>&1; then
            echo "  OK: docs/audit/*-audit.md (at least one present)"
          else
            echo "  MISSING: docs/audit/*-audit.md (no audit doc found)"
            MISSING=1
          fi
          exit $MISSING

      - name: Verify version consistency
        # Single source of truth is VERSION. Two derived surfaces must
        # agree: the CHANGELOG section header and the cyrius.cyml
        # file: indirection. dist/mihi.cyr's header is regenerated by
        # `cyrius distlib` from VERSION; drift is caught by ci's
        # distlib drift step.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -qE "^## \[${VERSION}\]" CHANGELOG.md \
            || { echo "FAIL: CHANGELOG.md missing section [${VERSION}]"; exit 1; }
          grep -qE '^version *= *"\$\{file:VERSION\}"' cyrius.cyml \
            || { echo "FAIL: cyrius.cyml version no longer pulls from VERSION"; exit 1; }
          echo "Version consistent: VERSION = CHANGELOG = cyrius.cyml = $VERSION"
