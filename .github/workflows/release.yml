name: Release

# Triggers on semver tags only (1.0.0, 1.2.3, 2.0.0-rc1). An optional
# leading `v` is accepted (v0.2.0). Non-numeric tags are ignored.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Gate — full CI must pass before anything builds for release.
  # Reuses ci.yml via workflow_call so a release can never ship a
  # dist artifact that hasn't passed lint / tests / smoke / distlib
  # drift / DCE parity / security scan / docs check.
  # ────────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ────────────────────────────────────────────────────────────────
  # Verify — VERSION file, cyrius.cyml indirection, and the git tag
  # must all agree before anything is packaged. mihi has no baked-in
  # version literal in source (dist/mihi.cyr's header is generated by
  # `cyrius distlib` from VERSION at build time); the distlib drift
  # step in CI catches stale bundles.
  # ────────────────────────────────────────────────────────────────
  version-verify:
    name: Version verify
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract VERSION / tag / cyml version
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v'
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+' \
            || { echo "::error::tag ($TAG) is not semver"; exit 1; }

          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file:  $VERSION"
          echo "git tag:       $TAG"

          if ! grep -qE '^version *= *"\$\{file:VERSION\}"' cyrius.cyml; then
            echo "::error::cyrius.cyml version no longer resolves via \${file:VERSION}" >&2
            exit 1
          fi

          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::VERSION ($VERSION) != git tag ($TAG)" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────
  # Package — regenerate dist/mihi.cyr from current sources, then
  # bundle dist artifact + project metadata. mihi is a library; the
  # consumable is dist/mihi.cyr (NOT a binary). build/mihi-smoke
  # stays in CI as proof-of-link only — not shipped.
  # ────────────────────────────────────────────────────────────────
  package:
    name: Package
    needs: version-verify
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION=$(grep 'cyrius *= *"' cyrius.cyml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Resolve dependencies
        run: cyrius deps

      - name: Regenerate dist bundle
        # CI's drift check verifies dist isn't stale; regen here so the
        # published artifact carries the freshly-written version header.
        # Belt and braces — drift catches stale check-in, regen
        # guarantees published bytes are canonical.
        run: |
          cyrius distlib
          echo "dist/mihi.cyr: $(wc -c < dist/mihi.cyr) bytes"

      - name: Package dist artifact
        # Single dist artifact: dist/mihi.cyr + minimal project
        # metadata. Consumers fetch this via `cyrius deps` from the
        # GH release, not from a tarball — but we ship a tarball too
        # for offline mirrors / vendoring.
        run: |
          PKG="mihi-${VERSION}"
          mkdir -p "pkg/$PKG"
          cp dist/mihi.cyr "pkg/$PKG/"
          cp README.md LICENSE CHANGELOG.md VERSION cyrius.cyml "pkg/$PKG/"
          mkdir -p out
          tar czf "out/${PKG}.tar.gz" -C pkg "$PKG"
          # Also publish dist/mihi.cyr standalone for direct fetch.
          cp dist/mihi.cyr "out/mihi-${VERSION}.cyr"

      - name: Generate SHA256
        run: |
          cd out
          sha256sum *.tar.gz *.cyr > SHA256SUMS.dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            out/*.tar.gz
            out/*.cyr
            out/SHA256SUMS.*

  # ────────────────────────────────────────────────────────────────
  # Source tarball — language-agnostic, always linux runner.
  # ────────────────────────────────────────────────────────────────
  source:
    name: Source tarball
    needs: version-verify
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          mkdir -p out
          git archive --format=tar.gz \
            --prefix="mihi-${VERSION}/" \
            -o "out/mihi-${VERSION}-src.tar.gz" HEAD
          cd out
          sha256sum "mihi-${VERSION}-src.tar.gz" > SHA256SUMS.src

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: |
            out/*.tar.gz
            out/SHA256SUMS.src

  # ────────────────────────────────────────────────────────────────
  # Release — collect artifacts + checksums, publish GitHub release.
  # Body pulled from the matching CHANGELOG.md section. Pre-1.0
  # releases publish as prerelease so package managers don't
  # auto-promote them.
  # ────────────────────────────────────────────────────────────────
  release:
    name: GitHub release
    needs: [package, source, version-verify]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-verify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw

      - name: Consolidate artifacts
        run: |
          mkdir -p out
          find dist-raw -type f \( -name '*.tar.gz' -o -name '*.cyr' -o -name 'SHA256SUMS.*' \) \
            -exec cp {} out/ \;
          cd out
          cat SHA256SUMS.* | sort -u > SHA256SUMS
          rm -f SHA256SUMS.*
          ls -la

      - name: Extract release body from CHANGELOG
        run: |
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/         { exit }
            found                    { print }
          ' CHANGELOG.md > /tmp/body.md
          if [ ! -s /tmp/body.md ]; then
            echo "::warning::CHANGELOG.md has no body for ${VERSION}; falling back to generated notes"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "mihi ${{ env.VERSION }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(env.VERSION, '0.') }}
          files: |
            out/*.tar.gz
            out/*.cyr
            out/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
